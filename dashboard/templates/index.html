<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid AI Bot Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">🧠 GRID AI - BOT AUTÓNOMO</div>
            <div id="status" class="status-badge status-online">
                <span class="dot"></span> SISTEMA ACTIVO 24/7
            </div>
        </header>

        <!-- Fila 1: Métricas Principales -->
        <div class="grid">
            <div class="card">
                <div class="card-title">Estado</div>
                <div id="balance" class="card-value">AI Grid Mode</div>
            </div>
            <div class="card">
                <div class="card-title">Señales Enviadas</div>
                <div id="total-pnl" class="card-value" style="color: #10b981;">0</div>
            </div>
            <div class="card">
                <div class="card-title">Modo Trading</div>
                <div id="btc-trend" class="card-value">Autónomo</div>
            </div>
        </div>

        <!-- Fila 2: Control del Bot -->
        <div class="card" style="margin-bottom: 2rem;">
            <div class="card-title">Control del Sistema</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                <button class="btn btn-primary" onclick="startBot()">INICIAR BOT</button>
                <button class="btn btn-danger" onclick="stopBot()">DETENER BOT</button>
            </div>
        </div>

        <!-- HISTORIAL DE SEÑALES -->
        <div class="card" style="margin-bottom: 2rem;">
            <div class="card-title">📊 Historial de Señales Grid</div>
            <div id="signal-history" class="signal-history-container">
                <p style="text-align: center; color: #64748b; padding: 2rem;">
                    Cargando historial de señales...
                </p>
            </div>
        </div>

        <!-- Logs -->
        <div class="card" style="margin-bottom: 2rem;">
            <div class="card-title">Registro de Actividad (Logs)</div>
            <div id="logs" class="logs-container">
                <div class="log-entry log-info">Esperando inicio del sistema...</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        socket.on('update_data', function (data) {
            if (data.balance) document.getElementById('balance').innerText = data.balance;
            if (data.total_pnl) document.getElementById('total-pnl').innerText = data.total_pnl;
            if (data.btc_trend) document.getElementById('btc-trend').innerText = data.btc_trend;
        });

        socket.on('new_log', function (data) {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + (data.type || 'log-info');
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${data.message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;

            // Mantener solo últimos 50 logs
            if (logsDiv.children.length > 50) {
                logsDiv.removeChild(logsDiv.firstChild);
            }
        });

        function loadSignalHistory() {
            fetch('/signal_history')
                .then(r => r.json())
                .then(history => {
                    const container = document.getElementById('signal-history');

                    if (history.length === 0) {
                        container.innerHTML = '<p style="text-align: center; color: #64748b; padding: 2rem;">No hay señales aún. El bot escaneará el mercado pronto.</p>';
                        return;
                    }

                    container.innerHTML = '';
                    history.forEach(signal => {
                        const card = document.createElement('div');
                        card.className = 'signal-card';
                        card.innerHTML = `
                            <div class="signal-header ${signal.direction === 'LONG' ? 'long' : 'short'}">
                                ${signal.direction === 'LONG' ? '🟢' : '🔴'} SEÑAL GRID ${signal.direction}
                                <span class="signal-time">${signal.timestamp || signal.time}</span>
                            </div>
                            <div class="signal-body">
                                <div class="signal-row">
                                    <span>💎 Moneda:</span>
                                    <strong>${signal.symbol}</strong>
                                </div>
                                <div class="signal-row">
                                    <span>📊 Parámetro Superior:</span>
                                    <strong>$${signal.parametro_superior || signal.upper || 'N/A'}</strong>
                                </div>
                                <div class="signal-row">
                                    <span>📉 Parámetro Inferior:</span>
                                    <strong>$${signal.parametro_inferior || signal.lower || 'N/A'}</strong>
                                </div>
                                <div class="signal-row">
                                    <span>💰 Precio Actual:</span>
                                    <strong>$${signal.precio_actual || signal.price || 'N/A'}</strong>
                                </div>
                                <div class="signal-row">
                                    <span>⚡ Apalancamiento:</span>
                                    <strong>5x</strong>
                                </div>
                                <div class="signal-row">
                                    <span>🔢 Número de Grids:</span>
                                    <strong>${signal.numero_grids || signal.grids || 'N/A'}</strong>
                                </div>
                                <div class="signal-row">
                                    <span>🛡️ Stop Loss:</span>
                                    <strong>$${signal.stop_loss || signal.sl || 'N/A'}</strong>
                                </div>
                                <div class="signal-row">
                                    <span>🎯 Take Profit:</span>
                                    <strong>$${signal.take_profit || signal.tp || 'N/A'}</strong>
                                </div>
                                <div class="signal-metrics">
                                    <span>🤖 Calidad: ${signal.calidad || 'N/A'}</span>
                                    <span>ADX: ${signal.adx || 'N/A'}</span>
                                    <span>Vol: ${signal.volumen_ratio || signal.vol || 'N/A'}x</span>
                                    <span>RSI: ${signal.rsi || 'N/A'}</span>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                });
        }

        function startBot() {
            fetch('/start').then(() => {
                alert('Bot iniciado');
                addLog('✅ Bot iniciado manualmente', 'log-success');
            });
        }

        function stopBot() {
            if (confirm('¿Seguro que quieres detener el bot?')) {
                fetch('/stop').then(() => {
                    alert('Bot detenido');
                    addLog('⏸️ Bot detenido manualmente', 'log-warning');
                });
            }
        }

        function addLog(message, type = 'log-info') {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        // Cargar historial al inicio y cada 30 segundos
        loadSignalHistory();
        setInterval(loadSignalHistory, 30000);
    </script>
</body>

</html>
